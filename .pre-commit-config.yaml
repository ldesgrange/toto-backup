repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        types_or: [shell]
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-format
        args: [--check, src, tests]
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-check
        args: [--no-fix, src, tests]
        pass_filenames: false
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: forbid-yml-extension
        name: forbid .yml extension
        entry: Use .yaml extension instead of .yml
        language: fail
        files: \.yml$
        stages: [pre-commit]

      - id: mise-typecheck
        name: mypy
        entry: mise run typecheck
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mise-licenseheaders
        name: licenseheaders
        entry: mise run licenseheaders
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mise-audit
        name: pip-audit
        entry: mise run audit
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
