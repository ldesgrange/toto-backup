[settings]
experimental = true # So hooks are run.
lockfile = true

[tools]
pdm = "latest"
pipx = "1.8.0"
python = "3.14.1"

[hooks]
postinstall = [
    "git config core.hooksPath .githooks",
    "pdm config lock.format pylock",
    "pdm install --plugins",
    "pdm install"
]

[env]
_.python.venv = { path = ".venv", create = true }
